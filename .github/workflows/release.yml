name: Release

# Baut die portable Single-File-.exe und stellt sie als Download-Artefakt bereit.
# Auslösen: manuell (Actions → Release → Run workflow) oder durch einen Tag v*.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (Single-File, self-contained, win-x64)
        run: >
          dotnet publish src/DariaTech.PcDoctor/DariaTech.PcDoctor.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: DariaTech-PC-Doktor-win-x64
          path: publish/DariaTech.PcDoctor.exe
          if-no-files-found: error
