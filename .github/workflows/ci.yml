name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DariaTech.PcDoctor.sln

      - name: Build
        run: dotnet build DariaTech.PcDoctor.sln -c Release --no-restore

      - name: Test
        run: dotnet test DariaTech.PcDoctor.sln -c Release --no-build --verbosity normal
